<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
<h2>Admin Panel</h2>
<ul>
<li>Dashboard</li>
<li>Students</li>
<li>Courses</li>
</ul>
</div>

<div class="main">

<h1>Admin Dashboard</h1>

<div class="card" id="countCard">
Total Students: 0
</div>

<h2>Add Student</h2>

<form id="studentForm">

<input type="text" id="name" placeholder="Student Name"><br>
<input type="text" id="sid" placeholder="Student ID"><br>
<input type="text" id="course" placeholder="Course"><br>

<button type="submit">Add Student</button>

</form>

<h2>Student Table</h2>

<table id="studentTable" border="1">
<tr>
<th>Name</th>
<th>ID</th>
<th>Course</th>
<th>Action</th>
</tr>
</table>

</div>

<script src="script.js"></script>

</body>
</html>
